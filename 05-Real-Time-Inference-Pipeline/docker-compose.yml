version: "3.8"

services:
  # Kafka-compatible broker (lighter than vanilla Kafka+Zookeeper)
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v23.3.5
    container_name: redpanda
    command:
      - redpanda
      - start
      - --smp=1
      - --memory=512M
      - --overprovisioned
      - --node-id=0
      - --check=false
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:9092
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD", "rpk", "cluster", "health"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  postgres:
    image: timescale/timescaledb:latest-pg15
    container_name: postgres
    environment:
      POSTGRES_USER: pipeline
      POSTGRES_PASSWORD: pipeline
      POSTGRES_DB: pipeline
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pipeline"]
      interval: 5s
      timeout: 3s
      retries: 10

  torchserve:
    build:
      context: .
      dockerfile: serving/Dockerfile
    container_name: torchserve
    ports:
      - "8080:8080"  # inference
      - "8081:8081"  # management
      - "8082:8082"  # metrics
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  producer:
    build:
      context: .
      dockerfile: producer/Dockerfile
    container_name: producer
    depends_on:
      redpanda:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      TRANSACTIONS_TOPIC: transactions
      EVENTS_PER_SEC: "5"
      N_USERS: "200"
    restart: unless-stopped

  consumer:
    build:
      context: .
      dockerfile: consumer/Dockerfile
    container_name: consumer
    depends_on:
      redpanda:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      torchserve:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      TRANSACTIONS_TOPIC: transactions
      SCORES_TOPIC: scores
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      TORCHSERVE_URL: http://torchserve:8080/predictions/fraud
      POSTGRES_DSN: "dbname=pipeline user=pipeline password=pipeline host=postgres port=5432"
    restart: unless-stopped

  dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
    container_name: dashboard
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_DSN: "dbname=pipeline user=pipeline password=pipeline host=postgres port=5432"
    ports:
      - "8501:8501"
    restart: unless-stopped

volumes:
  pgdata:
